name: 测试版构建

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
    paths-ignore:
      - '.github/workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - '.github/workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  # ------------ 提前准备（读取包名 & 生成 tag & 读取版本号） ------------
  prepare:
    name: 准备构建信息
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      datetime: ${{ steps.tag.outputs.datetime }}
      pkg: ${{ steps.pkg.outputs.pkg }}
      version: ${{ steps.ver.outputs.version }}
      version_changed: ${{ steps.ver.outputs.version_changed }}
      commit_subject: ${{ steps.commit.outputs.subject }}
      commit_body: ${{ steps.commit.outputs.body }}
      commit_author: ${{ steps.commit.outputs.author }}
      commit_date: ${{ steps.commit.outputs.date }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 读取 pubspec.yaml 包名
        id: pkg
        run: |
          pkg=$(grep '^name:' pubspec.yaml | awk '{print $2}')
          echo "🔍 检测到包名: $pkg"
          if [ -z "$pkg" ]; then
            echo "::error::无法从 pubspec.yaml 找到包名"
            exit 1
          fi
          echo "pkg=$pkg" >> $GITHUB_OUTPUT

      - name: 读取 pubspec.yaml 主版本号
        id: ver
        run: |
          raw=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "🔍 原始版本号: $raw"

          if [ -z "$raw" ]; then
            echo "::warning::无法从 pubspec.yaml 找到 version 字段"
            echo "version=" >> $GITHUB_OUTPUT
            echo "version_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          version="${raw%%+*}"
          echo "📦 主版本号: $version"
          echo "version=$version" >> $GITHUB_OUTPUT

          tag="v${version}"
          if git tag -l "$tag" | grep -q .; then
            echo "📌 标签 $tag 已存在，版本号未变化"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          else
            echo "🆕 标签 $tag 不存在，检测到版本号更新"
            echo "version_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 生成版本标签
        id: tag
        run: |
          datetime=$(date -u +"%Y%m%d%H%M")
          tag="v${datetime}"
          echo "⏱️ 构建时间: $datetime"
          echo "🏷️ 版本标签: $tag"
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "datetime=$datetime" >> $GITHUB_OUTPUT

      - name: 获取提交信息
        id: commit
        run: |
          echo "📝 正在获取当前提交信息..."
          
          # 获取完整的提交消息（标题 + 正文）
          commit_subject=$(git log -1 --pretty=format:"%s")
          commit_body=$(git log -1 --pretty=format:"%b")
          commit_author=$(git log -1 --pretty=format:"%an")
          commit_date=$(git log -1 --pretty=format:"%ci")

          echo "📍 提交信息："
          echo "  标题: $commit_subject"
          echo "  作者: $commit_author"
          echo "  时间: $commit_date"

          # 使用 base64 编码避免特殊字符问题
          subject_base64=$(echo "$commit_subject" | base64 -w 0)
          body_base64=$(echo "$commit_body" | base64 -w 0)

          echo "subject=$subject_base64" >> $GITHUB_OUTPUT
          echo "body=$body_base64" >> $GITHUB_OUTPUT
          echo "author=$commit_author" >> $GITHUB_OUTPUT
          echo "date=$commit_date" >> $GITHUB_OUTPUT

  # ------------ 构建 job（依赖 prepare） ------------
  build:
    name: 构建 ${{ matrix.platform }}-${{ matrix.arch }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            arch: x64
          - platform: windows
            os: windows-11-arm
            arch: arm64
          - platform: linux
            os: ubuntu-24.04-arm
            arch: arm64
          - platform: linux
            os: ubuntu-22.04
            arch: x64
          - platform: macos
            os: macos-latest
            arch: arm64
          - platform: android
            os: ubuntu-latest
            arch: x64
          - platform: android
            os: ubuntu-latest
            arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 输出构建信息
        run: |
          echo "============================================"
          echo "📦 包名:        ${{ needs.prepare.outputs.pkg }}"
          echo "⏫ 版本号:      ${{ needs.prepare.outputs.version }}"
          echo "🏷️ Tag:         ${{ needs.prepare.outputs.tag }}"
          echo "🕒 时间:        ${{ needs.prepare.outputs.datetime }}"
          echo "🖥️ 平台:        ${{ matrix.platform }}"
          echo "⚙️ 架构:        ${{ matrix.arch }}"
          echo "============================================"

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ (matrix.os == 'windows-11-arm' || matrix.os == 'ubuntu-24.04-arm') && 'master' || 'stable' }}
          cache: true

      - name: 配置 Java（Android）
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 配置 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装项目依赖
        shell: bash
        run: |
          echo "📦 正在安装项目依赖..."
          if [ "$RUNNER_OS" = "Linux" ] && [ "${{ matrix.platform }}" != "android" ]; then
            echo "  ➤ 安装 Linux 构建依赖..."
            sudo apt-get update
            sudo apt-get install -y libgtk-3-dev libappindicator3-dev adwaita-icon-theme-full libkeybinder-3.0-dev
            echo "  ✅ Linux 依赖安装完成"
          fi
          if [ "$RUNNER_OS" = "macOS" ]; then
            echo "  ➤ 启用 macOS 桌面支持..."
            flutter config --enable-macos-desktop
            echo "  ✅ macOS 桌面支持已启用"
          fi
          echo "  ➤ 安装 Flutter 主项目依赖"
          flutter pub get
          echo "  ➤ 安装 rinf_cli"
          cargo install rinf_cli
          echo "✅ 所有依赖安装完成"

      - name: 安装预构建脚本依赖
        run: dart pub get
        working-directory: scripts

      - name: 运行预构建脚本
        shell: bash
        run: |
          ARGS=""
          if [ "${{ matrix.platform }}" = "android" ]; then
            ARGS="--android"
          elif [ "$RUNNER_OS" != "macOS" ]; then
            ARGS="--installer"
          fi
          dart run scripts/prebuild.dart $ARGS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 生成 Rust 桥接代码
        run: rinf gen

      - name: 生成多语言文件
        run: dart run slang

      - name: 配置 Android 签名
        if: matrix.platform == 'android' && env.ANDROID_KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.jks
          echo "ANDROID_KEYSTORE_PATH=${{ runner.temp }}/release.jks" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: 运行构建脚本
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "android" ]; then
            ARGS="--android --android-arch=${{ matrix.arch }}"
          else
            ARGS="--with-installer"
          fi
          dart run scripts/build.dart $ARGS

  # ------------ 触发正式版构建 ------------
  trigger_release:
    name: 触发正式版构建
    needs: [prepare, build]
    if: github.event_name == 'push' && needs.prepare.outputs.version_changed == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: 触发正式版工作流
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release-build.yml --ref "${{ github.ref_name }}"
          echo "✅ 已触发正式版构建：${{ needs.prepare.outputs.version }}"

